<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기본 한국어 단어 — Basic Korean Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EE;
    --card: #FFFFFF;
    --ink: #1A1714;
    --ink2: #5A5450;
    --ink3: #9A928A;
    --accent: #C4523A;
    --accent2: #2D6A5A;
    --border: #E2DDD6;
    --pill-bg: #EDE8E0;
    --pill-fg: #5A5450;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 3rem 1.5rem;
  }
  header {
    max-width: 860px;
    margin: 0 auto 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1.5px solid var(--ink);
    padding-bottom: 1.25rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .title-block h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .title-block h1 span { color: var(--accent); font-style: italic; }
  .title-block p {
    font-size: 0.75rem;
    color: var(--ink3);
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .hyphen-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.72rem;
    color: var(--ink2);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .toggle-wrap {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
  }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--border);
    border-radius: 999px;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--ink);
    top: 3px; left: 3px;
    transition: transform 0.2s;
  }
  input:checked + .slider { background: var(--accent2); }
  input:checked + .slider::before { transform: translateX(18px); }

  .filter-bar {
    max-width: 860px;
    margin: 0 auto 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--ink2);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--ink2); color: var(--ink); }
  .filter-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .table-wrap {
    max-width: 860px;
    margin: 0 auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 10px 16px;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    font-weight: 400;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #F9F7F3; }
  td { padding: 11px 16px; font-size: 0.82rem; vertical-align: middle; }
  .kor {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--ink);
  }
  .rom {
    font-size: 0.78rem;
    color: var(--accent);
    margin-top: 2px;
  }
  .en { color: var(--ink); }
  .fil { color: var(--accent2); }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: var(--pill-bg);
    color: var(--pill-fg);
    white-space: nowrap;
  }
  .note-row td {
    background: #F0EDE6;
    font-size: 0.72rem;
    color: var(--ink2);
    padding: 8px 16px;
    font-style: italic;
  }
  footer {
    max-width: 860px;
    margin: 2.5rem auto 0;
    font-size: 0.68rem;
    color: var(--ink3);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>기본 한국어 <span>단어</span></h1>
    <p>Basic Korean Vocabulary · Filipino Reference</p>
  </div>
  <label class="hyphen-toggle">
    <span>음절 하이픈 ON</span>
    <div class="toggle-wrap">
      <input type="checkbox" id="hyphen-toggle" checked>
      <div class="slider"></div>
    </div>
  </label>
</header>

<div class="filter-bar" id="filters"></div>

<div class="table-wrap">
  <table id="vocab-table">
    <thead>
      <tr>
        <th>한국어</th>
        <th>Romanization</th>
        <th>English</th>
        <th>Filipino</th>
        <th>Category</th>
      </tr>
    </thead>
    <tbody id="vocab-body"></tbody>
  </table>
</div>

<footer>
  <span>Romanization: National Institute of the Korean Language standard</span>
  <span>Made with Lexilogos · 2026</span>
</footer>

<script>

  { kor:"여동생", romH:"Yeo-dong-saeng",  rom:"Yeodongsaeng",   en:"Younger sister", fil:"Kapatid na babae", cat:"family" },

  { kor:"밥",     romH:"Bap",       rom:"Bap",       en:"Rice / Meal", fil:"Kanin / Pagkain", cat:"food" },

  { kor:"지금",   romH:"Ji-geum",     rom:"Jigeum",    en:"Now", fil:"Ngayon (sandali)", cat:"time" },
  { kor:"아침",   romH:"A-chim",      rom:"Achim",     en:"Morning", fil:"Umaga", cat:"time" },

  { kor:"밤",     romH:"Bam",         rom:"Bam",       en:"Night", fil:"Gabi", cat:"time" },

  { kor:"집",     romH:"Jip",           rom:"Jip",        en:"Home / House", fil:"Bahay", cat:"places" },
  { kor:"학교",   romH:"Hak-gyo",       rom:"Hakgyo",     en:"School", fil:"Paaralan", cat:"places" },
  { kor:"병원",   romH:"Byeong-won",    rom:"Byeongwon",  en:"Hospital", fil:"Ospital", cat:"places" },
  { kor:"가게",   romH:"Ga-ge",         rom:"Gage",       en:"Store / Shop", fil:"Tindahan", cat:"places" },
  { kor:"화장실", romH:"Hwa-jang-sil",  rom:"Hwajangsil", en:"Restroom / Toilet", fil:"Banyo / CR", cat:"places" },

  { kor:"가다",       romH:"Ga-da",         rom:"Gada",       en:"To go", fil:"Pumunta", cat:"actions" },
  { kor:"오다",       romH:"O-da",          rom:"Oda",        en:"To come", fil:"Pumunta (rito)", cat:"actions" },
  { kor:"먹다",       romH:"Meok-da",       rom:"Meokda",     en:"To eat", fil:"Kumain", cat:"actions" },
  { kor:"마시다",     romH:"Ma-si-da",      rom:"Masida",     en:"To drink", fil:"Uminom", cat:"actions" },
  { kor:"자다",       romH:"Ja-da",         rom:"Jada",       en:"To sleep", fil:"Matulog", cat:"actions" },
  { kor:"보다",       romH:"Bo-da",         rom:"Boda",       en:"To see / watch", fil:"Manood / Makita", cat:"actions" },

  { kor:"빠르다", romH:"Ppa-reu-da",  rom:"Ppareuda",   en:"Fast", fil:"Mabilis", cat:"adjectives" },

  { kor:"싸다",   romH:"Ssa-da",      rom:"Ssada",      en:"Cheap", fil:"Mura", cat:"adjectives" },
  { kor:"피곤하다",romH:"Pi-gon-ha-da",rom:"Pigonhada", en:"Tired", fil:"Pagod", cat:"adjectives" },

const labels = {
  all:"모두 All", greetings:"인사 Greetings", numbers:"숫자 Numbers",
  pronouns:"대명사 Pronouns", family:"가족 Family", food:"음식 Food",
  time:"시간 Time", places:"장소 Places", actions:"동사 Actions", adjectives:"형용사 Adjectives"
};

let active = "all";
let useHyphen = true;

document.getElementById("hyphen-toggle").addEventListener("change", function() {
  useHyphen = this.checked;
  document.querySelector(".hyphen-toggle span").textContent = useHyphen ? "음절 하이픈 ON" : "음절 하이픈 OFF";
  render();
});

function render() {
  const rows = active === "all" ? data : data.filter(d => d.cat === active);
  document.getElementById("vocab-body").innerHTML = rows.map(d => {
    if (d.divider) return `<tr class="note-row"><td colspan="5">── 순우리말 숫자 Native Korean Numbers ──</td></tr>`;
    if (d.note) return `<tr class="note-row"><td colspan="5">한자어 숫자 Sino-Korean Numbers — used for dates, phone numbers, math</td></tr>`;
    if (d.note2) return `<tr class="note-row"><td colspan="5">순우리말 숫자 Native Korean Numbers — used for counting objects, age</td></tr>`;
    const romDisplay = useHyphen ? d.romH : d.rom;
    return `<tr>
      <td><div class="kor">${d.kor}</div></td>
      <td><div class="rom">${romDisplay}</div></td>
      <td class="en">${d.en}</td>
      <td class="fil">${d.fil}</td>
      <td><span class="badge">${labels[d.cat].split(" ")[1]}</span></td>
    </tr>`;
  }).join("");
}

const filterBar = document.getElementById("filters");
["all","greetings","numbers","pronouns","family","food","time","places","actions","adjectives"].forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (cat === active ? " active" : "");
  btn.textContent = labels[cat];
  btn.onclick = () => {
    active = cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  filterBar.appendChild(btn);
});

render();
</script>
</body>
</html>
